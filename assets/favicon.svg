<?xml version="1.0" encoding="UTF-8"?>
<!--
  The Right To Read — favicon
  Stylised cream-on-red silhouette evoking Savitribai Phule (head + bun + sari drape).
  Pamphlet palette: cream #f1e8d3 figure on vermilion #dc2a14 ground.
  Designed to remain readable as a "head & shoulders" form down to ~32 px.
  At 16 px it reads as a portrait silhouette.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" shape-rendering="geometricPrecision">
  <rect width="100" height="100" fill="#dc2a14"/>
  <!-- bun -->
  <ellipse cx="50" cy="16" rx="9" ry="8" fill="#f1e8d3"/>
  <!-- head -->
  <ellipse cx="50" cy="40" rx="20" ry="22" fill="#f1e8d3"/>
  <!-- sari drape / shoulders -->
  <path d="M 4 100 Q 4 72 26 63 Q 50 56 74 63 Q 96 72 96 100 Z" fill="#f1e8d3"/>
</svg>
